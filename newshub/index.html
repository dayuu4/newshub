<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NewsHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue:   #0066ff;  --cyan:   #00ffff;
      --dark:   #1e1e1e;  --darker: #141414;
      --card:   #252525;  --border: #333;
      --text:   #f0f0f0;  --muted:  #a0a0a0;  --faint: #606060;
      --green:  #00e676;  --red:    #ff5252;  --yellow: #ffd740;
      --hover:  #2d2d2d;  --sw: 260px;  --r: 8px;
      --shadow: 0 2px 10px rgba(0,0,0,.6);
      --glow:   0 0 14px rgba(0,102,255,.3);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter','DejaVu Sans',system-ui,sans-serif;background:var(--darker);color:var(--text);height:100vh;overflow:hidden}
    .app{display:flex;height:100vh;overflow:hidden}
    .sb{width:var(--sw);background:var(--dark);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
    .sb-head{padding:18px 16px 13px;border-bottom:1px solid var(--border);background:linear-gradient(160deg,#0a0a14 0%,#111827 100%)}
    .logo{display:flex;align-items:center;gap:8px;font-size:18px;font-weight:800;letter-spacing:-.3px;margin-bottom:10px;background:linear-gradient(90deg,var(--blue),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .logo-icon{-webkit-text-fill-color:initial;font-size:20px}
    .mode-badge{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:600;padding:3px 9px;border-radius:20px;letter-spacing:.03em}
    .mode-cloud{background:rgba(0,102,255,.12);color:var(--blue);border:1px solid rgba(0,102,255,.3)}
    .mode-dot{width:6px;height:6px;border-radius:50%;background:currentColor;animation:pulse 2s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .upd-txt{font-size:10.5px;color:var(--faint);margin-top:7px}
    .next-ref{font-size:10.5px;color:var(--faint);margin-top:2px}
    .next-ref span{color:var(--cyan);font-weight:600}
    .sb-sec{padding:11px 12px 3px}
    .sb-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--faint);padding:0 4px;display:block;margin-bottom:4px}
    .cat-btn{width:100%;text-align:left;padding:7px 10px;border:none;border-radius:var(--r);background:none;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);display:flex;align-items:center;gap:8px;transition:all .13s;margin-bottom:1px;font-family:inherit}
    .cat-btn:hover{background:var(--hover);color:var(--text)}
    .cat-btn.active{background:rgba(0,102,255,.15);color:var(--blue);border-left:2px solid var(--blue);padding-left:8px;font-weight:600}
    .cat-btn.bm.active{background:rgba(0,255,255,.08);color:var(--cyan);border-color:var(--cyan)}
    .cat-cnt{margin-left:auto;font-size:11px;font-weight:600;background:var(--border);color:var(--muted);border-radius:10px;padding:1px 7px;min-width:22px;text-align:center;transition:all .2s}
    .cat-btn.active .cat-cnt{background:var(--blue);color:#fff}
    .cat-btn.bm.active .cat-cnt{background:var(--cyan);color:#000}
    .feeds-scr{flex:1;overflow-y:auto;padding:0 12px 8px}
    .feed-row{display:flex;align-items:center;padding:5px 6px;border-radius:6px;font-size:12px;color:var(--muted);gap:7px;margin-bottom:1px;transition:background .13s}
    .feed-row:hover{background:var(--hover)}
    .feed-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
    .feed-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .feed-rm{background:none;border:none;color:var(--faint);cursor:pointer;font-size:12px;padding:0 2px;border-radius:3px;display:none;transition:color .13s;font-family:inherit}
    .feed-row:hover .feed-rm{display:block}
    .feed-rm:hover{color:var(--red)}
    .feed-st{font-size:12px;flex-shrink:0}
    .st-ok{color:var(--green)}.st-err{color:var(--red);cursor:pointer}.st-err:hover{opacity:.7}
    .st-load{color:var(--blue);animation:spin .8s linear infinite;display:inline-block}
    @keyframes spin{to{transform:rotate(360deg)}}
    .sb-foot{padding:10px 12px;border-top:1px solid var(--border)}
    .add-btn{width:100%;padding:8px;border:1.5px dashed var(--border);border-radius:var(--r);background:none;color:var(--muted);cursor:pointer;font-size:13px;transition:all .15s;font-family:inherit}
    .add-btn:hover{border-color:var(--blue);color:var(--blue);background:rgba(0,102,255,.07)}
    .main{flex:1;overflow:hidden;display:flex;flex-direction:column}
    .topbar{background:var(--dark);border-bottom:1px solid var(--border);padding:10px 18px;display:flex;align-items:center;gap:10px;flex-shrink:0}
    .tb-title{font-size:15px;font-weight:700;white-space:nowrap}
    .prog-wrap{height:2px;background:var(--border);flex-shrink:0}
    .prog-bar{height:100%;background:linear-gradient(90deg,var(--blue),var(--cyan));width:0%;transition:width .35s ease}
    .srch-wrap{flex:1;position:relative}
    .srch-ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--faint);font-size:13px;pointer-events:none}
    .srch{width:100%;padding:7px 12px 7px 30px;border:1px solid var(--border);border-radius:var(--r);background:var(--darker);color:var(--text);font-size:13.5px;outline:none;transition:border-color .15s;font-family:inherit}
    .srch:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(0,102,255,.15)}
    .srch::placeholder{color:var(--faint)}
    .ref-btn{padding:7px 15px;background:linear-gradient(135deg,var(--blue),#0044cc);color:#fff;border:none;border-radius:var(--r);cursor:pointer;font-size:13.5px;font-weight:700;display:flex;align-items:center;gap:5px;transition:all .15s;white-space:nowrap;font-family:inherit;box-shadow:var(--glow)}
    .ref-btn:hover{background:linear-gradient(135deg,#0077ff,#0055ee);transform:translateY(-1px)}
    .ref-btn:disabled{opacity:.55;cursor:not-allowed;transform:none}
    .ref-ico{display:inline-block}
    .spinning{animation:spin .8s linear infinite}
    .stats-bar{padding:5px 18px;font-size:11px;color:var(--faint);background:var(--dark);border-bottom:1px solid var(--border);display:none;align-items:center;gap:12px}
    .stats-bar.vis{display:flex}
    .stat-ok{color:var(--green)}.stat-err{color:var(--red)}
    .arts-outer{flex:1;overflow-y:auto;padding:16px 22px}
    .sec-hdr{display:flex;align-items:center;gap:10px;margin-bottom:10px;margin-top:2px}
    .sec-name{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--faint);white-space:nowrap}
    .sec-cnt{font-size:11px;color:var(--faint)}
    .sec-line{flex:1;height:1px;background:var(--border)}
    .arch-btn{background:none;border:1px solid var(--border);border-radius:5px;padding:2px 9px;font-size:11px;color:var(--faint);cursor:pointer;white-space:nowrap;transition:all .13s;font-family:inherit}
    .arch-btn:hover{background:var(--hover);color:var(--text)}
    .arts-list{display:flex;flex-direction:column;gap:8px;margin-bottom:22px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;cursor:pointer;text-decoration:none;display:block;color:inherit;transition:box-shadow .15s,border-color .15s,transform .15s,opacity .2s;position:relative}
    .card:hover{box-shadow:var(--shadow),var(--glow);border-color:var(--blue);transform:translateY(-1px)}
    .card.read{opacity:.42}
    .card.read .art-title{color:var(--muted)}
    .bm-btn{position:absolute;top:11px;right:11px;background:none;border:none;color:var(--faint);font-size:14px;cursor:pointer;padding:3px 5px;border-radius:4px;transition:all .15s;z-index:2;line-height:1}
    .bm-btn:hover{color:var(--cyan);background:rgba(0,255,255,.1)}
    .bm-btn.saved{color:var(--cyan)}
    .art-meta{display:flex;align-items:center;gap:7px;margin-bottom:6px;flex-wrap:wrap;padding-right:30px}
    .src-pill{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#fff;padding:2px 9px;border-radius:20px}
    .new-pill{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:#000;background:var(--cyan);padding:2px 7px;border-radius:20px}
    .art-date{margin-left:auto;font-size:0.69rem;color:var(--faint);white-space:nowrap}
    .art-title{font-size:0.91rem;font-weight:600;line-height:1.45;margin-bottom:5px}
    .art-desc{font-size:0.78rem;color:var(--muted);line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .state-box{text-align:center;padding:70px 20px;color:var(--muted)}
    .state-icon{font-size:44px;margin-bottom:14px}
    .state-title{font-size:17px;font-weight:700;margin-bottom:7px;color:var(--text)}
    .state-desc{font-size:13px}
    .skel-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:8px}
    .skel{border-radius:4px;background:linear-gradient(90deg,var(--border) 25%,var(--hover) 50%,var(--border) 75%);background-size:200% 100%;animation:shim 1.4s infinite}
    @keyframes shim{0%{background-position:200% 0}100%{background-position:-200% 0}}
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(3px)}
    .overlay.open{display:flex}
    .modal{background:var(--dark);border:1px solid var(--border);border-radius:14px;padding:26px;width:460px;max-width:92vw;box-shadow:var(--shadow)}
    .modal h3{font-size:16px;font-weight:700;margin-bottom:18px}
    .fg{margin-bottom:14px}
    .fl{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
    .fi,.fs{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--r);background:var(--darker);color:var(--text);font-size:13.5px;outline:none;transition:border-color .15s;font-family:inherit}
    .fi:focus,.fs:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(0,102,255,.15)}
    .fs{cursor:pointer;appearance:none}
    .fhint{font-size:11.5px;color:var(--faint);margin-top:4px}
    .m-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
    .btn{padding:8px 17px;border-radius:var(--r);font-size:13.5px;font-weight:600;cursor:pointer;border:none;transition:all .15s;font-family:inherit}
    .btn-p{background:var(--blue);color:#fff}.btn-p:hover{background:#0077ff}
    .btn-g{background:var(--hover);color:var(--text);border:1px solid var(--border)}.btn-g:hover{background:var(--border)}
    .toast{position:fixed;bottom:22px;right:22px;background:var(--card);color:var(--text);border:1px solid var(--border);padding:10px 16px;border-radius:9px;font-size:13px;font-weight:500;z-index:300;animation:slideup .2s ease;box-shadow:var(--shadow)}
    @keyframes slideup{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
    ::-webkit-scrollbar{width:5px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}
    ::-webkit-scrollbar-thumb:hover{background:var(--faint)}
    @media(max-width:640px){.sb{display:none}.tb-title{display:none}}
  </style>
</head>
<body>
<div class="app">
  <aside class="sb">
    <div class="sb-head">
      <div class="logo"><span class="logo-icon">⚡</span>NewsHub</div>
      <div class="mode-badge mode-cloud"><span class="mode-dot"></span>🌐 Cloud</div>
      <div class="upd-txt" id="updTxt">Never refreshed</div>
      <div class="next-ref" id="nextRef"></div>
    </div>
    <div class="sb-sec">
      <span class="sb-lbl">View</span>
      <button class="cat-btn active" data-cat="all" onclick="setCat('all')">🌐 All Sources <span class="cat-cnt" id="cnt-all">—</span></button>
      <button class="cat-btn bm" data-cat="bookmarks" onclick="setCat('bookmarks')">🔖 Bookmarks <span class="cat-cnt" id="cnt-bm">0</span></button>
    </div>
    <div class="sb-sec">
      <span class="sb-lbl">Categories</span>
      <button class="cat-btn" data-cat="ai" onclick="setCat('ai')">🤖 AI & ML <span class="cat-cnt" id="cnt-ai">—</span></button>
      <button class="cat-btn" data-cat="tech" onclick="setCat('tech')">💻 Tech <span class="cat-cnt" id="cnt-tech">—</span></button>
      <button class="cat-btn" data-cat="finance" onclick="setCat('finance')">📈 Finance <span class="cat-cnt" id="cnt-finance">—</span></button>
      <button class="cat-btn" data-cat="general" onclick="setCat('general')">📚 General <span class="cat-cnt" id="cnt-general">—</span></button>
    </div>
    <div class="sb-sec"><span class="sb-lbl">Sources</span></div>
    <div class="feeds-scr" id="feedList"></div>
    <div class="sb-foot"><button class="add-btn" onclick="openModal()">＋ Add Custom Feed</button></div>
  </aside>
  <div class="main">
    <div class="topbar">
      <div class="tb-title" id="tbTitle">All Sources</div>
      <div class="srch-wrap">
        <span class="srch-ico">🔍</span>
        <input class="srch" id="srchInput" type="text" placeholder="Search articles… (or press R to refresh, B for bookmarks)" oninput="onSearch(this.value)">
      </div>
      <button class="ref-btn" id="refBtn" onclick="refreshAll()"><span class="ref-ico" id="refIco">↻</span> Refresh</button>
    </div>
    <div class="prog-wrap"><div class="prog-bar" id="progBar"></div></div>
    <div class="stats-bar" id="statsBar">
      <span id="statTxt">Loading…</span>
      <span id="statOk" style="display:none" class="stat-ok"></span>
      <span id="statErr" style="display:none" class="stat-err"></span>
    </div>
    <div class="arts-outer" id="artsOuter">
      <div class="state-box"><div class="state-icon">⚡</div><div class="state-title">Starting NewsHub…</div><div class="state-desc">Fetching your feeds from the cloud</div></div>
    </div>
  </div>
</div>
<div class="overlay" id="overlay" onclick="ovClick(event)">
  <div class="modal">
    <h3>Add Custom Feed</h3>
    <div class="fg"><label class="fl">Feed Name</label><input class="fi" id="fName" type="text" placeholder="e.g. One Useful Thing"></div>
    <div class="fg"><label class="fl">RSS / Atom URL</label><input class="fi" id="fUrl" type="url" placeholder="https://www.oneusefulthing.org/feed" onkeydown="if(event.key==='Enter')saveFeed()"><div class="fhint">Most blogs publish a feed at /feed, /rss, or /feed.xml</div></div>
    <div class="fg"><label class="fl">Category</label><select class="fs" id="fCat"><option value="ai">🤖 AI & ML</option><option value="tech">💻 Tech</option><option value="finance">📈 Finance</option><option value="general">📚 General</option></select></div>
    <div class="m-actions"><button class="btn btn-g" onclick="closeModal()">Cancel</button><button class="btn btn-p" onclick="saveFeed()">Add Feed</button></div>
  </div>
</div>
<script>
'use strict';
const REFRESH_HRS=[9,12,15,18,21];
const ARCHIVE_DAYS=7;
const CAT_COLORS={ai:'#7c3aed',tech:'#0066ff',finance:'#00b37e',general:'#d97706'};
const CAT_LABELS={all:'All Sources',ai:'AI & ML',tech:'Tech',finance:'Finance',general:'General',bookmarks:'Bookmarks'};
// Custom feeds are fetched server-side via our own Netlify function (/api/articles?url=...)
const DEFAULT_FEEDS=[
  {id:'one-useful-thing',name:'One Useful Thing',url:'https://www.oneusefulthing.org/feed',cat:'ai'},
  {id:'simon-willison',name:'Simon Willison',url:'https://simonwillison.net/atom/everything/',cat:'ai'},
  {id:'hf',name:'Hugging Face',url:'https://huggingface.co/blog/feed.xml',cat:'ai'},
  {id:'the-batch',name:'The Batch (DL.AI)',url:'https://www.deeplearning.ai/the-batch/feed/',cat:'ai'},
  {id:'ai-news',name:'AI News',url:'https://www.artificialintelligence-news.com/feed/',cat:'ai'},
  {id:'mit-ai',name:'MIT AI News',url:'https://news.mit.edu/rss/topic/artificial-intelligence2',cat:'ai'},
  {id:'openai',name:'OpenAI Blog',url:'https://openai.com/news/rss.xml',cat:'ai'},
  {id:'deepmind',name:'Google DeepMind',url:'https://deepmind.google/blog/rss.xml',cat:'ai'},
  {id:'import-ai',name:'Import AI',url:'https://jack-clark.net/feed/',cat:'ai'},
  {id:'hn',name:'Hacker News',url:'https://hnrss.org/frontpage',cat:'tech'},
  {id:'tc',name:'TechCrunch',url:'https://techcrunch.com/feed/',cat:'tech'},
  {id:'verge',name:'The Verge',url:'https://www.theverge.com/rss/index.xml',cat:'tech'},
  {id:'ars',name:'Ars Technica',url:'https://feeds.arstechnica.com/arstechnica/index',cat:'tech'},
  {id:'engadget',name:'Engadget',url:'https://www.engadget.com/rss.xml',cat:'tech'},
  {id:'zdnet',name:'ZDNet',url:'https://www.zdnet.com/news/rss.xml',cat:'tech'},
  {id:'tldr-tech',name:'TLDR Tech',url:'https://tldr.tech/rss',cat:'tech'},
  {id:'cnbc',name:'CNBC Markets',url:'https://www.cnbc.com/id/100003114/device/rss/rss.html',cat:'finance'},
  {id:'mwatch',name:'MarketWatch',url:'https://feeds.marketwatch.com/marketwatch/topstories/',cat:'finance'},
  {id:'coindesk',name:'CoinDesk',url:'https://www.coindesk.com/arc/outboundfeeds/rss/',cat:'finance'},
  {id:'yahoo-finance',name:'Yahoo Finance',url:'https://finance.yahoo.com/news/rssindex',cat:'finance'},
  {id:'fool',name:'Motley Fool',url:'https://www.fool.com/feeds/index.aspx',cat:'finance'},
  {id:'bbc',name:'BBC News',url:'https://feeds.bbci.co.uk/news/rss.xml',cat:'general'},
  {id:'guardian',name:'The Guardian Tech',url:'https://www.theguardian.com/technology/rss',cat:'general'},
  {id:'mit-rev',name:'MIT Tech Review',url:'https://www.technologyreview.com/feed/',cat:'general'},
  {id:'nyt-tech',name:'NYT Technology',url:'https://rss.nytimes.com/services/xml/rss/nyt/Technology.xml',cat:'general'},
  {id:'new-scientist',name:'New Scientist',url:'https://www.newscientist.com/feed/home/',cat:'general'},
];
let allArts=[],activeCat='all',searchQ='',loading=false,showArch=false;
let statuses={},feeds=[];
const readSet=new Set(JSON.parse(localStorage.getItem('nh_read')||'[]'));
const bmSet=new Set(JSON.parse(localStorage.getItem('nh_bm')||'[]'));
let bmArts=JSON.parse(localStorage.getItem('nh_bm_arts')||'[]');
let customFeeds=JSON.parse(localStorage.getItem('nh_custom')||'[]');
let fontSize=parseFloat(localStorage.getItem('nh_fs')||'1');document.documentElement.style.fontSize=(fontSize*16)+'px';
function cl(s){if(!s)return'';return(s+'').replace(/<[^>]*>/g,' ').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&#039;/g,"'").replace(/&nbsp;/g,' ').replace(/\s+/g,' ').trim()}
function sd(s){if(!s)return null;const d=new Date(s);return isNaN(d)?null:d}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function adjustFont(d){fontSize=Math.round(Math.max(0.75,Math.min(1.5,fontSize+d))*100)/100;localStorage.setItem('nh_fs',fontSize);document.documentElement.style.fontSize=(fontSize*16)+'px';}
async function fx(url,ms=13000){const c=new AbortController(),t=setTimeout(()=>c.abort(),ms);try{const r=await fetch(url,{signal:c.signal});clearTimeout(t);if(!r.ok)throw new Error('HTTP '+r.status);return r}catch(e){clearTimeout(t);throw e}}
async function fetchOneProxy(feed){
  statuses[feed.id]='load';renderFeedList();
  try{
    const apiUrl=`/api/articles?url=${encodeURIComponent(feed.url)}&name=${encodeURIComponent(feed.name)}&cat=${encodeURIComponent(feed.cat)}`;
    const r=await fx(apiUrl,15000);
    const arts=await r.json();
    const normalised=arts.map(a=>({title:a.title,link:a.link,date:a.date?new Date(a.date):null,desc:a.desc||''})).filter(a=>a.link&&a.title);
    statuses[feed.id]=normalised.length?'ok':'err';
    renderFeedList();return normalised;
  }catch(e){statuses[feed.id]='err';renderFeedList();return[];}
}
async function refreshAll(){
  if(loading)return;
  loading=true;
  const btn=document.getElementById('refBtn'),ico=document.getElementById('refIco');
  btn.disabled=true;ico.classList.add('spinning');
  document.getElementById('statsBar').classList.add('vis');
  renderSkeletons();
  showStats('Fetching from cloud…',0,0,false);
  DEFAULT_FEEDS.forEach(f=>statuses[f.id]='load');
  renderFeedList();
  try{
    const resp=await fetch('/api/articles',{signal:AbortSignal.timeout(30000)});
    if(!resp.ok)throw new Error('HTTP '+resp.status);
    const serverArts=await resp.json();
    allArts=serverArts.map(a=>({...a,id:a.feedId+'::'+a.link}));
    DEFAULT_FEEDS.forEach(f=>statuses[f.id]='ok');
    if(customFeeds.length>0){
      showStats('Loading custom feeds…',allArts.length,0,false);
      document.getElementById('progBar').style.width='80%';
      await Promise.allSettled(customFeeds.map(feed=>fetchOneProxy(feed).then(arts=>{
        const newArts=arts.map(a=>({...a,id:feed.id+'::'+a.link,source:feed.name,cat:feed.cat,feedId:feed.id}));
        const seen=new Set(allArts.map(a=>a.id));
        allArts=[...allArts,...newArts.filter(a=>!seen.has(a.id))];
      }).catch(()=>{})));
      allArts.sort((a,b)=>toTS(b.date)-toTS(a.date));
    }
    showStats(`${feeds.length} sources`,allArts.length,0,true);
    updateCounts();renderArticles();
    toast(`✓ ${allArts.length} articles loaded`);
  }catch(e){
    DEFAULT_FEEDS.forEach(f=>statuses[f.id]='err');
    showStats('Could not reach server',0,1,true);
    document.getElementById('artsOuter').innerHTML=`<div class="state-box"><div class="state-icon">⚠️</div><div class="state-title">Could not load articles</div><div class="state-desc">Check your connection and try refreshing</div></div>`;
    toast('Load failed — check connection');
  }
  loading=false;btn.disabled=false;ico.classList.remove('spinning');
  document.getElementById('progBar').style.width='100%';
  setTimeout(()=>document.getElementById('progBar').style.width='0%',900);
  document.getElementById('updTxt').textContent='Updated '+new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  renderFeedList();
}
function showStats(txt,ok,err,done){document.getElementById('statTxt').textContent=txt;const oe=document.getElementById('statOk'),ee=document.getElementById('statErr');oe.style.display=ok?'':'none';oe.textContent=`· ✓ ${ok} articles`;ee.style.display=err?'':'none';ee.textContent=`· ✕ ${err} failed`;}
async function retryFeed(){refreshAll()}
function checkAutoRefresh(){const now=new Date(),h=now.getHours(),m=now.getMinutes();if(REFRESH_HRS.includes(h)&&m===0){const key=`nh_ar_${h}_${now.toDateString()}`;if(!localStorage.getItem(key)){localStorage.setItem(key,'1');refreshAll()}}updateNextLabel();}
function updateNextLabel(){const now=new Date(),h=now.getHours(),m=now.getMinutes();const next=REFRESH_HRS.find(rh=>rh>h||(rh===h&&m<1));const el=document.getElementById('nextRef');if(next!==undefined){const lbl=next===12?'12:00 PM':next>12?`${next-12}:00 PM`:`${next}:00 AM`;el.innerHTML=`Next refresh at <span>${lbl}</span>`}else{el.innerHTML=`Next refresh <span>tomorrow 9:00 AM</span>`}}
setInterval(checkAutoRefresh,60000);updateNextLabel();
document.addEventListener('keydown',e=>{if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;if(e.key==='r'||e.key==='R')refreshAll();if(e.key==='b'||e.key==='B')setCat(activeCat==='bookmarks'?'all':'bookmarks');});
function toggleBm(id,el,ev){ev.preventDefault();ev.stopPropagation();const art=allArts.find(a=>a.id===id)||bmArts.find(a=>a.id===id);if(bmSet.has(id)){bmSet.delete(id);bmArts=bmArts.filter(a=>a.id!==id);el.classList.remove('saved');toast('Bookmark removed')}else{bmSet.add(id);if(art&&!bmArts.find(a=>a.id===id))bmArts.push(art);el.classList.add('saved');toast('Bookmarked!')}localStorage.setItem('nh_bm',JSON.stringify([...bmSet]));localStorage.setItem('nh_bm_arts',JSON.stringify(bmArts));updateCounts();}
function setCat(cat){activeCat=cat;document.querySelectorAll('.cat-btn').forEach(b=>b.classList.toggle('active',b.dataset.cat===cat));document.getElementById('tbTitle').textContent=CAT_LABELS[cat]||cat;renderFeedList();renderArticles();}
function onSearch(v){searchQ=v.toLowerCase().trim();renderArticles();}
function visible(){if(activeCat==='bookmarks'){let a=bmArts;if(searchQ)a=a.filter(x=>x.title?.toLowerCase().includes(searchQ)||x.desc?.toLowerCase().includes(searchQ));return a}let a=allArts;if(activeCat!=='all')a=a.filter(x=>x.cat===activeCat);if(searchQ)a=a.filter(x=>x.title?.toLowerCase().includes(searchQ)||x.desc?.toLowerCase().includes(searchQ)||x.source?.toLowerCase().includes(searchQ));return a;}
function updateCounts(){const c={all:0,ai:0,tech:0,finance:0,general:0};allArts.forEach(a=>{c.all++;if(c[a.cat]!==undefined)c[a.cat]++;});Object.entries(c).forEach(([k,v])=>{const el=document.getElementById('cnt-'+k);if(el)el.textContent=v;});const bel=document.getElementById('cnt-bm');if(bel)bel.textContent=bmSet.size;}
function toTS(d){if(!d)return 0;const ts=typeof d==='string'?new Date(d):d;return isNaN(ts)?0:ts.getTime();}
function fmtDate(d){const ts=typeof d==='string'?new Date(d):d;if(!ts||isNaN(ts))return'';const diff=Date.now()-ts.getTime(),h=Math.floor(diff/3600000),dy=Math.floor(diff/86400000);if(h<1)return'Just now';if(h<24)return h+'h ago';if(dy<7)return dy+'d ago';return ts.toLocaleDateString('en-US',{month:'short',day:'numeric',year:ts.getFullYear()!==new Date().getFullYear()?'numeric':undefined});}
function isNew(d){return toTS(d)>0&&Date.now()-toTS(d)<86400000;}
function isRecent(d){return toTS(d)>0&&Date.now()-toTS(d)<ARCHIVE_DAYS*86400000;}
function cardHtml(a){const isBm=bmSet.has(a.id),isRead=readSet.has(a.id),color=CAT_COLORS[a.cat]||'#555';return `<a class="card${isRead?' read':''}" href="${esc(a.link)}" target="_blank" rel="noopener noreferrer" data-id="${esc(a.id)}" onclick="onCardClick(this)"><button class="bm-btn${isBm?' saved':''}" onclick="toggleBm('${esc(a.id)}',this,event)" title="${isBm?'Remove bookmark':'Bookmark'}">🔖</button><div class="art-meta"><span class="src-pill" style="background:${color}">${esc(a.source)}</span>${isNew(a.date)?'<span class="new-pill">New</span>':''}<span class="art-date">${fmtDate(a.date)}</span></div><div class="art-title">${esc(a.title)}</div>${a.desc?`<div class="art-desc">${esc(a.desc)}</div>`:''}</a>`;}
function onCardClick(el){const id=el.getAttribute('data-id');if(id){readSet.add(id);localStorage.setItem('nh_read',JSON.stringify([...readSet].slice(-3000)));el.classList.add('read');}}
function renderArticles(){const outer=document.getElementById('artsOuter'),arts=visible();if(!arts.length&&!loading){const isBm=activeCat==='bookmarks';outer.innerHTML=`<div class="state-box"><div class="state-icon">${searchQ?'🔍':isBm?'🔖':'📭'}</div><div class="state-title">${searchQ?'No results':isBm?'No bookmarks yet':'No articles yet'}</div><div class="state-desc">${searchQ?'Try a different search':isBm?'Click 🔖 on any article to save it':'Click Refresh to load your feeds'}</div></div>`;return;}const recent=arts.filter(a=>isRecent(a.date)),arch=arts.filter(a=>!isRecent(a.date));let html='';if(recent.length)html+=`<div class="sec-hdr"><span class="sec-name">Recent</span><span class="sec-cnt">${recent.length} article${recent.length!==1?'s':''}</span><div class="sec-line"></div></div><div class="arts-list">${recent.map(cardHtml).join('')}</div>`;if(arch.length)html+=`<div class="sec-hdr"><span class="sec-name">Archive</span><span class="sec-cnt">${arch.length} article${arch.length!==1?'s':''}</span><div class="sec-line"></div><button class="arch-btn" id="archBtn" onclick="toggleArch()">${showArch?'▲ Hide':'▼ Show'}</button></div><div id="archGrid" style="${showArch?'':'display:none'}"><div class="arts-list">${arch.map(cardHtml).join('')}</div></div>`;if(!html)html=`<div class="state-box"><div class="state-icon">⏳</div><div class="state-title">Loading…</div><div class="state-desc">Articles arriving from cloud</div></div>`;outer.innerHTML=html;}
function toggleArch(){showArch=!showArch;const g=document.getElementById('archGrid'),b=document.getElementById('archBtn');if(g)g.style.display=showArch?'':'none';if(b)b.textContent=showArch?'▲ Hide':'▼ Show';}
function renderSkeletons(){document.getElementById('artsOuter').innerHTML=`<div class="sec-hdr"><span class="sec-name">Loading…</span><div class="sec-line"></div></div>${Array(7).fill(0).map(()=>`<div class="skel-card"><div class="skel" style="width:85px;height:14px;margin-bottom:9px"></div><div class="skel" style="width:88%;height:17px;margin-bottom:7px"></div><div class="skel" style="width:62%;height:12px"></div></div>`).join('')}`;}
function renderFeedList(){const toShow=activeCat==='all'||activeCat==='bookmarks'?feeds:feeds.filter(f=>f.cat===activeCat);document.getElementById('feedList').innerHTML=toShow.map(f=>{const s=statuses[f.id]||'pending';const icon=s==='load'||s==='loading'?`<span class="feed-st st-load">↻</span>`:s==='ok'?`<span class="feed-st st-ok">✓</span>`:s==='err'||s==='error'?`<span class="feed-st st-err" onclick="retryFeed('${f.id}')" title="Click to retry">↺</span>`:`<span class="feed-st" style="color:var(--border)">·</span>`;const isCust=customFeeds.some(c=>c.id===f.id);return `<div class="feed-row" title="${esc(f.url||'')}"><div class="feed-dot" style="background:${CAT_COLORS[f.cat]||'#555'}"></div><span class="feed-name">${esc(f.name)}</span>${isCust?`<button class="feed-rm" onclick="removeFeed('${f.id}')">✕</button>`:''} ${icon}</div>`;}).join('');}
function openModal(){document.getElementById('overlay').classList.add('open');setTimeout(()=>document.getElementById('fName').focus(),50);}
function closeModal(){document.getElementById('overlay').classList.remove('open');['fName','fUrl'].forEach(id=>document.getElementById(id).value='');}
function ovClick(e){if(e.target===document.getElementById('overlay'))closeModal();}
async function saveFeed(){const name=document.getElementById('fName').value.trim(),url=document.getElementById('fUrl').value.trim(),cat=document.getElementById('fCat').value;if(!name||!url){toast('Please fill in both fields');return;}const feed={id:'c_'+Date.now(),name,url,cat};closeModal();toast(`Adding "${name}"…`);customFeeds.push(feed);feeds.push(feed);localStorage.setItem('nh_custom',JSON.stringify(customFeeds));const arts=await fetchOneProxy(feed);const newArts=arts.map(a=>({...a,id:feed.id+'::'+a.link,source:feed.name,cat:feed.cat,feedId:feed.id}));const seen=new Set(allArts.map(a=>a.id));allArts=[...allArts,...newArts.filter(a=>!seen.has(a.id))].sort((a,b)=>toTS(b.date)-toTS(a.date));updateCounts();renderFeedList();renderArticles();toast(`"${name}" added`);}
async function removeFeed(id){customFeeds=customFeeds.filter(f=>f.id!==id);localStorage.setItem('nh_custom',JSON.stringify(customFeeds));feeds=feeds.filter(f=>f.id!==id);allArts=allArts.filter(a=>a.feedId!==id);delete statuses[id];renderFeedList();updateCounts();renderArticles();toast('Feed removed');}
function toast(msg){document.querySelectorAll('.toast').forEach(t=>t.remove());const el=Object.assign(document.createElement('div'),{className:'toast',textContent:msg});document.body.appendChild(el);setTimeout(()=>el.remove(),3500);}
feeds=[...DEFAULT_FEEDS,...customFeeds];
renderFeedList();updateCounts();refreshAll();
</script>
</body>
